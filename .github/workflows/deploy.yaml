name: Sausage Store Deploy

on:
  push:
    branches:
      - main

env:
  NEXUS_HELM_REPO: https://nexus.cloud-services-engineer.education-services.ru/repository/krainikov-cry1s/
  NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
  NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}
  SAUSAGE_STORE_NAMESPACE: r-devops-magistracy-project-2sem-581642393
  KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
  VAULT_TOKEN: ${{ secrets.VAULT_TOKEN }}

jobs:
  # Сборка и пуш образов в докерхаб:
  build_and_push_to_docker_hub:
      name: Push Docker image to DockerHub
      runs-on: ubuntu-latest
      steps:
        - name: Check out the repo
          # Получение исходного кода из репозитория:
          uses: actions/checkout@v3
        - name: Set up Docker Buildx
          # Установка сборщика контейнеров Docker:
          uses: docker/setup-buildx-action@v2
        - name: Login to Docker 
          # Авторизация на Docker Hub:
          uses: docker/login-action@v2
          # При помощи with передаём в action параметры username и password:
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}
            # Хорошо ли держать логин и пароль прямо в коде workflow?
            # Нет, это нехорошо. Хранить пароль надо в Secrets.
        - name: Push Backend to DockerHub
          # Одновременный билд и пуш образа в Docker Hub:
          uses: docker/build-push-action@v4
          with:
            # Параметр context: ./backend/ указывает, что нужный Dockerfile 
            # находится в ./backend/
            context: ./backend/
            # Параметр push: true указывает, что образ нужно не только собрать,
            # но и отправить на Docker Hub:
            push: true
            # В параметре tags задаётся название и тег для образа.
            # Для каждого пересобранного образа 
            # устанавливаем тег latest, чтобы потом
            # на сервере и в docker-compose.yml не указывать версию образа:
            tags: YOUR_DOCKERHUB/sausage-backend:latest
            build-args: |
              VERSION=${{ github.sha }}
        - name: Push Frontend to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./frontend/
            push: true
            tags: YOUR_DOCKERHUB/sausage-frontend:latest
        - name: Push Backend-report to DockerHub
          uses: docker/build-push-action@v4
          with:
            context: ./backend-report/
            push: true
            tags: YOUR_DOCKERHUB/sausage-backend-report:latest
  # Упаковываем helm-чарт и пушим его в Nexus
  add_helm_chart_to_nexus:
      name: Add Helm Chart To Nexus
      runs-on: ubuntu-latest
      needs: build_and_push_to_docker_hub

      steps:
        - name: Check out the repo
          uses: actions/checkout@v4

        - name: Install Helm
          uses: azure/setup-helm@v4
          with:
            version: v3.13.0

        - name: Build Helm chart dependencies
          run: helm dependency build ./sausage-store-chart

        - name: Lint Helm chart
          run: helm lint ./sausage-store-chart

        - name: Package Helm chart
          run: helm package ./sausage-store-chart --destination ./dist

        - name: Upload Helm chart to Nexus
          run: |
            chart_package="$(find ./dist -name 'sausage-store-*.tgz' -type f -print -quit)"
            test -n "${chart_package}"
            curl --fail-with-body \
              --user "${NEXUS_HELM_REPO_USER}:${NEXUS_HELM_REPO_PASSWORD}" \
              --upload-file "${chart_package}" \
              "${NEXUS_HELM_REPO%/}/$(basename "${chart_package}")"

  # Деплоим приложения в кластер Kubernetes с помощью helm-чарт
  deploy_helm_chart_to_kubernetes:
      name: Deploy Helm Chart To Kubernetes
      runs-on: ubuntu-latest
      needs: add_helm_chart_to_nexus

      steps:
        - name: Install Helm
          uses: azure/setup-helm@v4
          with:
            version: v3.13.0

        - name: Add Nexus Helm repo
          run: |
            helm repo add nexus "${NEXUS_HELM_REPO}" \
              --username "${NEXUS_HELM_REPO_USER}" \
              --password "${NEXUS_HELM_REPO_PASSWORD}"
            helm repo update

        - name: Set up kubeconfig
          run: |
            mkdir -p "${HOME}/.kube"
            if printf '%s' "${KUBE_CONFIG}" | base64 -d > "${HOME}/.kube/config" 2>/dev/null; then
              chmod 600 "${HOME}/.kube/config"
            else
              printf '%s' "${KUBE_CONFIG}" > "${HOME}/.kube/config"
              chmod 600 "${HOME}/.kube/config"
            fi
            echo "KUBECONFIG=${HOME}/.kube/config" >> "${GITHUB_ENV}"

        - name: Deploy Helm chart to Kubernetes
          run: |
            helm upgrade --install sausage-store nexus/sausage-store \
              --namespace "${SAUSAGE_STORE_NAMESPACE}" \
              --kubeconfig "${KUBECONFIG}" \
              --set backend.image=cry1s/sausage-backend:latest \
              --set backend-report.image=cry1s/sausage-backend-report:latest \
              --set frontend.image=cry1s/sausage-frontend:latest \
              --wait \
              --timeout 10m
