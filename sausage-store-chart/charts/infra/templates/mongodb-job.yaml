apiVersion: batch/v1
kind: Job
metadata:
  name: mongodb-init-reports
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongodb-init-reports
  annotations:
    "helm.sh/hook": "post-install"
    "helm.sh/hook-delete-policy": "before-hook-creation"
    "helm.sh/hook-weight": "5"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app: mongodb-init-reports
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongo-client
          image: {{ .Values.mongodb.image }}
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          command:
            - sh
            - -c
            - |
              set -e

              until mongosh --host mongodb \
                --port "$MONGO_PORT" \
                -u "$MONGO_INITDB_ROOT_USERNAME" \
                -p "$MONGO_INITDB_ROOT_PASSWORD" \
                --authenticationDatabase admin \
                --eval "db.adminCommand('ping')" \
                --quiet; do
                sleep 5
              done

              mongosh --host mongodb \
                --port "$MONGO_PORT" \
                -u "$MONGO_INITDB_ROOT_USERNAME" \
                -p "$MONGO_INITDB_ROOT_PASSWORD" \
                --authenticationDatabase admin <<EOF
              db = db.getSiblingDB("$REPORTS_DB");
              if (!db.getUser("$REPORTS_USER")) {
                db.createUser({
                  user: "$REPORTS_USER",
                  pwd: "$REPORTS_PASSWORD",
                  roles: [{ role: "readWrite", db: "$REPORTS_DB" }]
                });
              }
              EOF
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: mongodb-conf
                  key: MONGO_INITDB_ROOT_USERNAME
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                configMapKeyRef:
                  name: mongodb-conf
                  key: MONGO_INITDB_ROOT_PASSWORD
            - name: MONGO_PORT
              value: {{ .Values.mongodb.containerPort | quote }}
            - name: REPORTS_DB
              value: {{ .Values.mongodb.reports.database | quote }}
            - name: REPORTS_USER
              value: {{ .Values.mongodb.reports.user | quote }}
            - name: REPORTS_PASSWORD
              value: {{ .Values.mongodb.reports.password | quote }}
